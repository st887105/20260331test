<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車城國小｜因材網學力檢測考古題 AI 智慧補救系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary:#1e88e5; --primary-dark:#1565c0; --success:#43a047; --bg:#f4f7f6; }
        body { background:var(--bg); font-family:'Segoe UI',sans-serif; }
        .app-header { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; padding:20px 0; box-shadow:0 4px 6px rgba(0,0,0,.1); margin-bottom:30px; }
        .card { border-radius:15px; border:none; box-shadow:0 6px 12px rgba(0,0,0,.05); }
        .btn-custom { border-radius:25px; padding:10px 25px; font-weight:bold; }

        /* 選項按鈕 - DOM 建立，不用 innerHTML */
        .option-btn { display:block; width:100%; padding:14px 18px; margin-bottom:10px; border:2px solid #e0e0e0; border-radius:12px; background:#fff; text-align:left; font-size:1rem; cursor:pointer; transition:all .2s; word-break:break-word; }
        .option-btn:hover { background:#f0f8ff; border-color:var(--primary); transform:translateX(3px); }
        .option-btn.selected { background:#e3f2fd; border-color:var(--primary); font-weight:bold; color:var(--primary-dark); }
        .option-prefix { display:inline-block; width:28px; height:28px; line-height:28px; text-align:center; border-radius:50%; background:#e0e0e0; font-weight:bold; margin-right:10px; font-size:.85rem; }
        .option-btn.selected .option-prefix { background:var(--primary); color:#fff; }

        /* 難度標籤 */
        .badge-easy { background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7; }
        .badge-medium { background:#fff8e1; color:#f57f17; border:1px solid #ffe082; }
        .badge-hard { background:#fce4ec; color:#c62828; border:1px solid #ef9a9a; }
        .q-type-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:.75rem; font-weight:bold; margin-bottom:8px; }
        .q-type-single { background:#e3f2fd; color:#1565c0; }
        .q-type-fill { background:#f3e5f5; color:#6a1b9a; }

        /* 填充題輸入 */
        .fill-input { border:2px solid #e0e0e0; border-radius:12px; padding:14px 18px; font-size:1rem; width:100%; transition:border-color .2s; }
        .fill-input:focus { border-color:var(--primary); outline:none; box-shadow:0 0 0 3px rgba(30,136,229,.15); }

        /* 題目切換動畫 */
        #question-container { animation:fadeIn .3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        /* AI 生成進度面板 */
        .ai-panel { background:#e8f5e9; border-left:5px solid #4caf50; padding:15px; border-radius:5px; display:none; margin-top:15px; }
        .ai-progress-panel { background:#fff; border:1px solid #e0e0e0; border-radius:12px; padding:16px; margin-top:12px; display:none; }
        .batch-log { max-height:150px; overflow-y:auto; font-size:.8rem; color:#555; }
        .batch-log-item { padding:3px 0; border-bottom:1px solid #f0f0f0; }
        .batch-log-item:last-child { border-bottom:none; }

        /* 計算紙 */
        #draw-panel { display:none; margin-top:15px; }
        .signature-pad { border:2px dashed #b0bec5; border-radius:10px; background:#fff; width:100%; height:280px; touch-action:none; }
        /* ── 吉祥物 ── */
        .mascot-wrap { position:relative; display:inline-block; }
        .mascot-img {
            width:90px; height:90px;
            object-fit:contain;
            border-radius:50%;
            background:#fff;
            box-shadow:0 4px 14px rgba(0,0,0,.18);
            animation: mascotBob 3s ease-in-out infinite;
        }
        @keyframes mascotBob {
            0%,100% { transform:translateY(0) rotate(-2deg); }
            50%      { transform:translateY(-8px) rotate(2deg); }
        }
        /* 標題列重新排版，讓吉祥物和文字並排 */
        .header-inner {
            display:flex; align-items:center; justify-content:center;
            gap:18px; flex-wrap:wrap;
        }
        .header-text { text-align:left; }
        .header-text h2 { font-size:1.45rem; margin:0; }
        .header-text p  { margin:4px 0 0; font-size:.88rem; opacity:.9; }

        .progress { height:10px; border-radius:10px; }
        .progress-bar { transition:width .4s ease; }

        /* ── 成績總覽表格 ── */
        .results-table th { background:#1e88e5; color:#fff; font-size:.82rem; white-space:nowrap; }
        .results-table td { font-size:.82rem; vertical-align:middle; }
        .score-high { color:#2e7d32; font-weight:bold; }
        .score-mid  { color:#f57f17; font-weight:bold; }
        .score-low  { color:#c62828; font-weight:bold; }
        .detail-row { background:#fafafa; }
        .detail-btn { cursor:pointer; font-size:.78rem; }

        /* ── 差異化分析 ── */
        .node-card { border-radius:12px; border:none; box-shadow:0 2px 8px rgba(0,0,0,.08); margin-bottom:12px; }
        .node-bar { height:18px; border-radius:9px; background:linear-gradient(90deg,#e53935,#ef9a9a); transition:width .6s ease; }
        .node-bar-wrap { background:#f5f5f5; border-radius:9px; overflow:hidden; }

        /* ── 教學講義（列印優化）── */
        .worksheet-node-title { background:#1565c0; color:#fff; padding:8px 14px; border-radius:8px 8px 0 0; font-weight:bold; }
        .worksheet-problem { border:1px solid #e0e0e0; border-radius:0 0 8px 8px; padding:14px; margin-bottom:16px; }
        .ws-step { background:#fff8e1; border-left:4px solid #ffc107; padding:8px 12px; border-radius:4px; font-size:.88rem; margin-bottom:10px; }
        .ws-hint { background:#e3f2fd; border-left:4px solid #1e88e5; padding:6px 12px; border-radius:4px; font-size:.82rem; color:#1565c0; margin-top:8px; }
        .answer-blank { display:inline-block; min-width:80px; border-bottom:2px solid #333; margin:0 6px; }

        @media print {
            /* 隱藏所有介面元素，只保留講義 */
            .app-header, .nav-tabs, .tab-content, #view-login, #view-quiz,
            .btn, select, input, .mb-3, .alert, .ai-panel,
            .d-flex, #ai-generation-panel, #analysis-container,
            #worksheet-container > .d-flex { display:none !important; }

            /* 讓 #printable-worksheet 填滿整頁 */
            body, html { margin:0 !important; padding:0 !important; background:#fff !important; }
            #printable-worksheet {
                display:block !important;
                width:100% !important;
                margin:0 !important;
                padding:0 !important;
                font-size:11pt !important;
                color:#000 !important;
            }
            /* 確保彩色區塊在列印時也有背景色 */
            * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
            .ws-node-block { page-break-inside:avoid; margin-bottom:14pt !important; }
            .ws-problem-item { page-break-inside:avoid; }
        }
    </style>

    <script>
    const isGAS = typeof google !== 'undefined' && google.script;
    let globalUniqueNodes = [];

    const API = {
        getTasks: () => new Promise(res => isGAS ? google.script.run.withSuccessHandler(res).getTasks() : setTimeout(()=>res(['五甲補救']),500)),
        getStudents: t => new Promise(res => isGAS ? google.script.run.withSuccessHandler(res).getStudents(t) : setTimeout(()=>res([{seatNo:'01',name:'大明',weakNode:'N-5-9'}]),500)),
        generateQuiz: (n,t) => new Promise(res => isGAS ? google.script.run.withSuccessHandler(res).generateQuiz(n,t) : setTimeout(()=>res([
            {id:'Q1',node:'N-5-9',text:'小明有 3/4 個蛋糕，媽媽帶回 1/2 個，共幾個？',type:'single',options:['1又1/4個','5/4個','3/8個','4/6個'],answer:'1又1/4個',difficulty:'medium'},
            {id:'Q2',node:'N-5-9',text:'3/4 ＋ 1/4 ＝（　）',type:'fill',options:[],answer:'1',difficulty:'easy'}
        ]),500)),
        submitQuizResult: d => new Promise(res => isGAS ? google.script.run.withSuccessHandler(res).submitQuizResult(d) : setTimeout(()=>res(true),500)),
        verifyAdmin: p => new Promise(res => isGAS ? google.script.run.withSuccessHandler(res).verifyAdmin(p) : setTimeout(()=>res(p==='1234'),500)),
        uploadTaskData: (n,g,d,nd) => new Promise(res => isGAS ? google.script.run.withSuccessHandler(res).uploadTaskData(n,g,d,nd) : setTimeout(()=>res(true),500)),
        setupDatabase: () => { if(isGAS) google.script.run.withSuccessHandler(msg=>Swal.fire('完成',msg,'success')).setupDatabase(); else Swal.fire('模擬','已初始化','success'); },
        // 【核心】逐批呼叫，前端控制進度
        generateBatch: (nodes, grade, batchIdx) => new Promise((res,rej) => {
            if(isGAS) google.script.run.withSuccessHandler(res).withFailureHandler(rej).generateBatch(nodes, grade, batchIdx);
            else setTimeout(()=>res({ done: batchIdx>=2, current:batchIdx+1, total:3, addedThisBatch:6, nodes:['測試節點'], message:`第${batchIdx+1}/3批完成` }),1500);
        }),
        getQuizSettings: () => new Promise(res => isGAS ? google.script.run.withSuccessHandler(res).getQuizSettings() : setTimeout(()=>res({quizCount:10}),500)),
        updateQuizSettings: c => new Promise(res => isGAS ? google.script.run.withSuccessHandler(res).updateQuizSettings(c) : setTimeout(()=>res('更新成功'),500)),
        clearBankCache: () => new Promise(res => isGAS ? google.script.run.withSuccessHandler(res).clearBankCache() : setTimeout(()=>res('✅ 快取已清除（模擬）'),500)),
        getQuestionErrorRates: t => new Promise((res,rej) => isGAS

                {questionText:'2/3 - 1/3 = ？',node:'N-5-10',correctAns:'1/3',total:10,wrong:4,wrongRate:40,wrongAnswers:[{name:'大明',seatNo:'01',ans:'1/6'}]},
                {questionText:'小明有3/4個蛋糕，正解是？',node:'N-5-9',correctAns:'1又1/4',total:10,wrong:2,wrongRate:20,wrongAnswers:[{name:'小美',seatNo:'03',ans:'4/3'}]}
              ]),500)),
        getTaskResults: t => new Promise((res,rej) => isGAS ? google.script.run.withSuccessHandler(res).withFailureHandler(rej).getTaskResults(t) : setTimeout(()=>res([

            ]},
            {seatNo:'02',name:'小華',score:50,timeSpent:120,submittedAt:'2026/1/1 10:05:00',details:[
                {id:'Q1',node:'N-5-9',questionText:'3/4+1/4=？',userAns:'2/4',correctAns:'1',isCorrect:false},
                {id:'Q2',node:'N-5-10',questionText:'5/6-1/3=？',userAns:'4/3',correctAns:'1/2',isCorrect:false},
                {id:'Q3',node:'N-5-9',questionText:'2/3+1/2=？',userAns:'7/6',correctAns:'7/6',isCorrect:true}

        ]),500)),
        analyzeClassWeakNodes: t => new Promise((res,rej) => isGAS ? google.script.run.withSuccessHandler(res).withFailureHandler(rej).analyzeClassWeakNodes(t) : setTimeout(()=>res([
            {node:'N-5-9',wrongCount:8,studentCount:10,wrongRate:80,students:['大明','小華','小美']},
            {node:'N-5-10',wrongCount:5,studentCount:10,wrongRate:50,students:['大明','小華']},
            {node:'N-5-11',wrongCount:3,studentCount:10,wrongRate:30,students:['小美']}
        ]),500)),
        generateTeachingWorksheet: (nodes,grade) => new Promise((res,rej) => isGAS ? google.script.run.withSuccessHandler(res).withFailureHandler(rej).generateTeachingWorksheet(nodes,grade) : setTimeout(()=>res([
            {node:'N-5-9',step:'第一步：找公分母；第二步：通分；第三步：分子相加',text:'1/4 + 1/4 = （　）',type:'fill',answer:'1/2',hint:'分母相同時，直接把分子加起來！'},
            {node:'N-5-9',step:'第一步：找公分母；第二步：通分；第三步：分子相加',text:'1/3 + 1/3 = （　）',type:'fill',answer:'2/3',hint:'分母一樣，只要加分子就好！'}
        ]),1500))
    };

    let currentQuestions=[], currentIdx=0, userAnswers={}, quizTimer=null, secondsElapsed=0, sigPad=null;

    // HTML 跳脫，防止 XSS
    function escapeHtml(str) {
        return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // 答案正規化（前後端一致）
    function normalizeAnswer(str) {
        return String(str||'').trim().replace(/\s+/g,'')
            .replace(/[\uff10-\uff19]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
            .replace(/，/g,',').toLowerCase();
    }

    window.onload = async () => {
        initCanvas();
        const tasks = await API.getTasks();

    function switchView(id) {

            document.getElementById(v).style.display = v===id ? (id==='view-quiz'?'block':'flex') : 'none';

    async function populateAdminTaskSelects() {
        const tasks = await API.getTasks();
        ['results-task-select','qerror-task-select','analysis-task-select'].forEach(id => {
            const sel = document.getElementById(id);
            if(!sel) return;
            sel.innerHTML = '<option value="">-- 選擇任務 --</option>';
            tasks.forEach(t => { const o=document.createElement('option'); o.value=t; o.textContent=t; sel.appendChild(o); });

    async function saveQuizSettings() {
        const count = document.getElementById('setting-quiz-count').value;
        if(!count||count<1) return Swal.fire('錯誤','題數至少要 1 題！','warning');
        Swal.fire({title:'儲存中...',didOpen:()=>Swal.showLoading()});
        const msg = await API.updateQuizSettings(count);
        Swal.fire('成功',msg,'success');
    }

    function showHelp() {
        Swal.fire({title:'設定說明',html:'<div class="text-start small"><p>至試算表 <b>Config</b> 設定：<br>1. <code>AdminPassword</code>：教師密碼<br>2. <code>GeminiAPIKey</code>：Google AI Studio 申請的免費金鑰</p><p>選項欄位使用 JSON 陣列格式儲存，請勿手動修改格式。</p></div>'});
    }

    function processExcel() {
        const fileInput = document.getElementById('excel-file');
        const taskName = document.getElementById('new-task-name').value;
        const grade = document.getElementById('task-grade').value;
        if(!fileInput.files.length||!taskName) return Swal.fire('錯誤','請選擇檔案並輸入任務名稱','warning');
        Swal.fire({title:'讀取與解析中...',didOpen:()=>Swal.showLoading()});
        const reader = new FileReader();
        reader.onload = async e => {
            try {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data,{type:'array'});
                const jsonData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
                let extracted=[], nodesSet=new Set();
                for(let i=1;i<jsonData.length;i++) {
                    const row=jsonData[i];
                    if(!row||!row.length) continue;
                    const seat=String(row[0]||'').trim(), name=String(row[1]||'').trim();
                    const acc=String(row[2]||'').trim(), rawNode=String(row[3]||'').trim();
                    const validNode = /\d/.test(rawNode) ? rawNode : '';
                    if(name) extracted.push({seatNo:seat,name,accuracy:acc,weakNodes:validNode});
                    if(validNode) nodesSet.add(validNode);
                }
                globalUniqueNodes = Array.from(nodesSet).filter(n=>n.length>0);
                Swal.fire({title:'上傳中...',didOpen:()=>Swal.showLoading()});
                await API.uploadTaskData(taskName, grade, extracted, globalUniqueNodes);
                Swal.fire({title:'完成',text:'學生名單建立成功！',icon:'success',showCancelButton:true,confirmButtonText:'留在後台（擴充題庫）',cancelButtonText:'回到首頁'})
                    .then(r=>{ if(!r.isConfirmed) switchView('view-login'); });
                if(globalUniqueNodes.length>0) {
                    document.getElementById('ai-generation-panel').style.display='block';
                    document.getElementById('weak-count').innerText = globalUniqueNodes.length;
                    document.getElementById('weak-list').innerText = globalUniqueNodes.join(', ');
                }
            } catch(err) {
                Swal.fire('解析失敗','請確認是有效的 Excel 檔。','error');
            }
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    }

    // ==========================================
    // 【核心】批次生成 + 即時進度條
    // 前端逐批呼叫後端 generateBatch()
    // 每批完成後立即更新進度條與 log
    // ==========================================
    async function triggerAIGeneration() {
        const grade = document.getElementById('task-grade').value;
        const btn = document.getElementById('btn-ai-generate');
        const progressPanel = document.getElementById('ai-progress-panel');
        const progressBar = document.getElementById('ai-progress-bar');
        const progressCount = document.getElementById('progress-count');
        const progressTitle = document.getElementById('progress-title');
        const batchLog = document.getElementById('batch-log');

        // 初始化進度 UI
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 生成中，請稍候...';
        progressPanel.style.display = 'block';
        progressBar.style.width = '0%';
        progressCount.textContent = '計算中...';
        batchLog.innerHTML = '';

        try {
            let batchIndex = 0;
            let totalBatches = null;
            let totalAdded = 0;

            // 逐批呼叫，直到 done === true
            while (true) {
                progressTitle.textContent = `🤖 第 ${batchIndex+1} 批次命題中...`;

                const result = await API.generateBatch(globalUniqueNodes, grade, batchIndex);

                // 更新進度
                if (totalBatches === null) totalBatches = result.total;
                totalAdded += (result.addedThisBatch || 0);
                const pct = Math.round((result.current / result.total) * 100);
                progressBar.style.width = pct + '%';
                progressCount.textContent = `${result.current} / ${result.total} 批`;

                // 加入 log
                const logItem = document.createElement('div');
                logItem.className = 'batch-log-item';
                logItem.innerHTML = `✅ ${escapeHtml(result.message)}`;
                batchLog.appendChild(logItem);
                batchLog.scrollTop = batchLog.scrollHeight;

                if (result.done) break;
                batchIndex++;

                // 批次之間等待 2 秒（讓 UI 有機會更新）
                await new Promise(r => setTimeout(r, 2000));
            }

            progressBar.classList.remove('progress-bar-animated');
            progressTitle.textContent = '🎉 全部完成！';

            Swal.fire({
                title:'題庫擴充完成！',
                html:`<p>共完成 <b>${totalBatches}</b> 批次，新增 <b>${totalAdded}</b> 題（含選擇題與填充題）！</p>`,
                icon:'success', showCancelButton:true,
                confirmButtonText:'留在後台', cancelButtonText:'回到首頁'
            }).then(r=>{
                document.getElementById('ai-generation-panel').style.display='none';
                progressPanel.style.display='none';
                if(!r.isConfirmed) switchView('view-login');
            });

        } catch(err) {
            const errorMsg = err.message || String(err);
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> 重試 AI 批次擴充題庫';
            progressBar.classList.remove('progress-bar-animated');
            progressBar.classList.add('bg-danger');

            if(errorMsg.includes('UrlFetchApp')||errorMsg.includes('權限')) {
                Swal.fire({title:'⚠️ 缺少外部連線權限',html:'<div class="text-start small"><ol><li>回到 Apps Script 編輯器。</li><li>執行函數選 <code>testAIGeneration</code> → 點「執行」。</li><li>「審查權限」→帳號→「進階」→「前往(不安全)」→「允許」。</li><li>重新部署：「部署」→「管理部署作業」→鉛筆→版本選「建立新版本」→部署。</li></ol></div>',icon:'error'});
            } else {
                Swal.fire('生成失敗', errorMsg, 'error');
            }
        }
    }

    async function loadStudents() {
        const task = document.getElementById('task-select').value;
        const sel = document.getElementById('student-select');
        if(!task){sel.disabled=true;return;}
        sel.disabled=false; sel.innerHTML='<option value="">載入中...</option>';
        const students = await API.getStudents(task);
        sel.innerHTML='<option value="">-- 請選擇你的名字 --</option>';
        students.forEach((s,i)=>{
            const o=document.createElement('option');
            o.value=i; o.textContent=`${s.seatNo}號 - ${s.name}`;
            o.dataset.student=JSON.stringify(s);
            sel.appendChild(o);
        });
    }

    function getSelectedStudent() {
        const sel = document.getElementById('student-select');
        const opt = sel.options[sel.selectedIndex];
        if(!opt||!opt.dataset.student) return null;
        return JSON.parse(opt.dataset.student);
    }

    async function startQuiz() {
        const student = getSelectedStudent();
        if(!student) return Swal.fire('錯誤','請選擇姓名','warning');
        const taskName = document.getElementById('task-select').value;
        document.getElementById('quiz-student-name').innerText=`${student.name} 的魔法挑戰`;
        Swal.fire({title:'抓取專屬題庫中...',didOpen:()=>Swal.showLoading()});
        const [fetchedQ, settings] = await Promise.all([API.generateQuiz(student.weakNode,taskName), API.getQuizSettings()]);
        currentQuestions=fetchedQ; Swal.close();
        if(!currentQuestions.length) return Swal.fire('提示','目前沒有適合的題目，請老師至後台擴充！','info');
        if(currentQuestions.length<settings.quizCount) {
            Swal.fire({title:'💡 題庫不足',text:`預計 ${settings.quizCount} 題，目前只有 ${currentQuestions.length} 題，建議擴充題庫。`,icon:'info',toast:true,position:'top-end',showConfirmButton:false,timer:6000});
        }
        currentIdx=0; userAnswers={}; secondsElapsed=0;
        quizTimer=setInterval(()=>{
            secondsElapsed++;
            document.getElementById('timer').innerText=`${String(Math.floor(secondsElapsed/60)).padStart(2,'0')}:${String(secondsElapsed%60).padStart(2,'0')}`;
        },1000);
        renderQuestion(); switchView('view-quiz'); setTimeout(resizeCanvas,100);
    }

    // 題目渲染（DOM API，防止 HTML 注入破壞選項）
    function renderQuestion() {
        const q = currentQuestions[currentIdx];
        const container = document.getElementById('question-container');
        container.innerHTML='';

        // 題號 + 標籤
        const meta = document.createElement('div');
        meta.className='d-flex align-items-center gap-2 mb-3 flex-wrap';
        meta.innerHTML=`
            <span class="text-muted small">題號 ${currentIdx+1} / ${currentQuestions.length}</span>
            <span class="q-type-badge ${q.type==='single'?'q-type-single':'q-type-fill'}">${q.type==='single'?'📋 選擇題':'✏️ 填充題'}</span>
            <span class="badge ${q.difficulty==='easy'?'badge-easy':q.difficulty==='hard'?'badge-hard':'badge-medium'}">${q.difficulty==='easy'?'⭐ 基礎':q.difficulty==='hard'?'🔥 挑戰':'💡 中等'}</span>
        `;
        container.appendChild(meta);

        // 題目
        const qText = document.createElement('h5');
        qText.className='mb-4 lh-base'; qText.textContent=q.text;
        container.appendChild(qText);

        if(q.type==='single') {
            const prefixes=['A','B','C','D','E'];
            // 確保 options 一定是陣列（防止 GAS 傳回字串）
            const opts = Array.isArray(q.options) ? q.options : (()=>{try{return JSON.parse(q.options||'[]');}catch(e){return [];}})();
            opts.forEach((opt,i)=>{
                const btn=document.createElement('button');
                btn.className='option-btn'+(userAnswers[q.id]===opt?' selected':'');
                const prefix=document.createElement('span');
                prefix.className='option-prefix'; prefix.textContent=prefixes[i]||String(i+1);
                const text=document.createElement('span'); text.textContent=opt;
                btn.appendChild(prefix); btn.appendChild(text);
                btn.dataset.value=opt;
                btn.addEventListener('click',function(){
                    container.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
                    this.classList.add('selected');
                    userAnswers[q.id]=this.dataset.value;
                });
                container.appendChild(btn);
            });
        } else {
            const hint=document.createElement('p');
            hint.className='text-muted small mb-2';
            hint.textContent='💡 請直接輸入數字或計算結果（例：3/4 或 1.5）';
            container.appendChild(hint);
            const input=document.createElement('input');
            input.type='text'; input.className='fill-input';
            input.placeholder='在這裡輸入你的答案...';
            input.value=userAnswers[q.id]||'';
            input.addEventListener('input',function(){ userAnswers[q.id]=this.value; });
            input.addEventListener('keydown',function(e){ if(e.key==='Enter') navQuestion(1); });
            container.appendChild(input);
            setTimeout(()=>input.focus(),100);
        }

        document.getElementById('quiz-progress').style.width=`${(currentIdx/currentQuestions.length)*100}%`;
        document.getElementById('btn-prev').disabled=currentIdx===0;
        document.getElementById('btn-next').style.display=currentIdx===currentQuestions.length-1?'none':'block';
        document.getElementById('btn-submit').style.display=currentIdx===currentQuestions.length-1?'block':'none';
    }

    function navQuestion(dir) {
        if(dir===1) {
            const ans=String(userAnswers[currentQuestions[currentIdx].id]||'').trim();
            if(!ans) { Swal.fire('⚠️ 尚未作答','請先選擇或輸入答案！','warning'); return; }
        }
        currentIdx+=dir; renderQuestion();
        document.getElementById('view-quiz').scrollIntoView({behavior:'smooth'});
    }

    async function submitQuiz() {
        const unanswered=[];
        currentQuestions.forEach((q,i)=>{ if(!String(userAnswers[q.id]||'').trim()) unanswered.push(i+1); });
        if(unanswered.length) { Swal.fire('⚠️ 尚未完成',`第 ${unanswered.join(', ')} 題還沒填寫！`,'warning'); return; }
        clearInterval(quizTimer);
        let score=0, details=[];
        currentQuestions.forEach(q=>{
            const uAns=normalizeAnswer(userAnswers[q.id]);
            const cAns=normalizeAnswer(q.answer);
            const correct=uAns===cAns;
            if(correct) score+=100/currentQuestions.length;
            // questionText 帶入題目原文，displayCorrectAns 保留未正規化正解供顯示
            details.push({id:q.id,node:q.node,questionText:q.text,userAns:userAnswers[q.id],correctAns:q.answer,displayCorrectAns:q.displayAnswer||q.answer,isCorrect:correct});
        });
        score=Math.round(score);

        // 成績摘要
        // ======================================================
        // 【完整成績頁】顯示所有題目 + 學生答案 + 正解對照
        // ======================================================
        const wrongs = details.filter(d=>!d.isCorrect);
        const corrects = details.filter(d=>d.isCorrect);

        let html = `<div class="text-center mb-3">
            <span style="font-size:3rem;font-weight:bold;color:${score>=60?'#43a047':'#e53935'}">${score} 分</span>
            <div class="mt-1 text-muted small">答對 ${corrects.length} 題 ／ 答錯 ${wrongs.length} 題</div>
        </div>`;

        // 全部題目對照表（可捲動）
        html += `<div style="max-height:55vh;overflow-y:auto;border:1px solid #e0e0e0;border-radius:10px;padding:8px;">`;
        details.forEach((d, idx) => {
            const showCorrect = d.displayCorrectAns || d.correctAns;
            const showUser    = d.userAns || '（未作答）';
            const showQ       = d.questionText ? escapeHtml(d.questionText) : `第 ${idx+1} 題`;
            if(d.isCorrect) {
                html += `<div class="mb-2 p-2 rounded" style="background:#f0fff4;border-left:4px solid #43a047;">
                    <div class="small text-muted mb-1">${idx+1}. ${showQ}</div>
                    <span class="text-success fw-bold">✅ 你答：${escapeHtml(showUser)}</span>
                </div>`;
            } else {
                html += `<div class="mb-2 p-2 rounded" style="background:#fff5f5;border-left:4px solid #e53935;">
                    <div class="small text-muted mb-1">${idx+1}. ${showQ}</div>
                    <div>❌ 你答：<b class="text-danger">${escapeHtml(showUser)}</b></div>
                    <div>✅ 正解：<b class="text-success">${escapeHtml(showCorrect)}</b></div>
                </div>`;
            }
        });
        html += `</div>`;
        if(wrongs.length===0) html += `<p class="text-success fw-bold text-center mt-2">🎉 全部答對！太厲害了！</p>`;

        Swal.fire({title:'成績結算中...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});
        const student=getSelectedStudent();
        await API.submitQuizResult({
            taskName:document.getElementById('task-select').value,
            seatNo:student.seatNo, name:student.name,
            score, timeSpent:secondsElapsed, details
        });
        Swal.fire({title:'挑戰完成！',html,icon:score>=60?'success':'info',confirmButtonText:'回首頁'})
            .then(()=>switchView('view-login'));
    }

    // 分頁2：載入學生作答成績
    async function loadAdminResults() {
        const taskName = document.getElementById('results-task-select').value;
        const container = document.getElementById('results-table-container');

    function buildDetailHtml(details) {
        if(!details||!details.length) return '<p class="text-muted small mb-0">無作答明細</p>';

        details.forEach((d,i) => {

            if(d.isCorrect) {
                html += `<div class="p-2 rounded" style="background:#f0fff4;border-left:3px solid #43a047;font-size:.82rem;">
                    <span class="text-muted">${i+1}.</span> ${escapeHtml(qText)}

                </div>`;

                html += `<div class="p-2 rounded" style="background:#fff5f5;border-left:3px solid #e53935;font-size:.82rem;">
                    <span class="text-muted">${i+1}.</span> ${escapeHtml(qText)}<br>

    async function loadQuestionErrors() {
        const taskName = document.getElementById('qerror-task-select').value;
        const container = document.getElementById('qerror-container');
        const summary   = document.getElementById('qerror-summary');
        if(!taskName) { container.innerHTML='<p class="text-muted text-center py-4">請先選擇任務</p>'; summary.textContent=''; return; }

        container.innerHTML='<p class="text-center text-muted py-3"><i class="fa-solid fa-spinner fa-spin"></i> 統計中...</p>';
        const qData = await API.getQuestionErrorRates(taskName);

        if(!qData.length) { container.innerHTML='<p class="text-center text-muted py-4">此任務尚無足夠的作答資料</p>'; return; }

        summary.textContent = `共 ${qData.length} 題`;

        // 計算全班平均錯誤率
        const avgWrongRate = Math.round(qData.reduce((s,q)=>s+q.wrongRate,0)/qData.length);
        const highErrorQs  = qData.filter(q=>q.wrongRate>=60).length;

        let html = `<div class="row g-2 mb-3">
            <div class="col-4"><div class="card text-center p-2"><div class="fw-bold text-danger fs-5">${highErrorQs}</div><div class="small text-muted">高錯誤率題目（≥60%）</div></div></div>
            <div class="col-4"><div class="card text-center p-2"><div class="fw-bold text-warning fs-5">${avgWrongRate}%</div><div class="small text-muted">全班平均錯誤率</div></div></div>
            <div class="col-4"><div class="card text-center p-2"><div class="fw-bold text-primary fs-5">${qData.length}</div><div class="small text-muted">統計題目總數</div></div></div>
        </div>
        <div class="table-responsive"><table class="table table-hover results-table align-middle">
            <thead><tr>
                <th style="width:40%">題目內容</th>
                <th>節點</th>
                <th>正解</th>
                <th>錯誤人數</th>
                <th>錯誤率</th>
                <th>常見錯誤答案</th>
            </tr></thead><tbody>`;

        qData.forEach((q, idx) => {
            const rateColor = q.wrongRate>=70?'#e53935':q.wrongRate>=40?'#fb8c00':'#43a047';

            q.wrongAnswers.forEach(w=>{ ansCount[w.ans]=(ansCount[w.ans]||0)+1; });

                    <div class="d-flex align-items-center gap-2">
                        <div style="flex:1;background:#f5f5f5;border-radius:6px;height:12px;overflow:hidden;">
                            <div style="width:${q.wrongRate}%;height:100%;background:${rateColor};border-radius:6px;"></div>
                        </div>
                        <span style="color:${rateColor};font-weight:bold;white-space:nowrap;">${q.wrongRate}%</span>
                    </div>
                </td>
                <td class="small">${topWrong||'<span class="text-muted">無</span>'}</td>

        });

        html += '</tbody></table></div>';
        container.innerHTML = html;

        try {

                <div style="font-size:10pt;color:#555;margin-bottom:8px;">弱點節點：${nodes.map(escapeHtml).join('、')}　　出卷日期：${today}</div>

                    <tr>
                        <td style="padding:3px 12px;">班級：<span style="display:inline-block;min-width:80px;border-bottom:1.5px solid #333;">&nbsp;</span></td>
                        <td style="padding:3px 12px;">座號：<span style="display:inline-block;min-width:60px;border-bottom:1.5px solid #333;">&nbsp;</span></td>
                        <td style="padding:3px 12px;">姓名：<span style="display:inline-block;min-width:100px;border-bottom:1.5px solid #333;">&nbsp;</span></td>
                    </tr>
                </table>
            </div>
            ${nodeBlocks}
            <div style="text-align:center;font-size:9pt;color:#999;margin-top:10px;padding-top:8px;border-top:1px solid #eee;">
                ✦ 本練習卷由 AI 根據全班共同弱點自動生成，僅供課堂輔助教學使用 ✦
            </div>
        </div>
        <div class="alert alert-info small mt-3 d-print-none" style="max-width:760px;margin:8px auto 0;">
            <i class="fa-solid fa-print"></i> 點上方「列印講義」按鈕，將開啟新視窗並自動列印 A4 格式。
        </div>`;

        return previewHtml;
    }

    function buildPrintableHtml(questions, grade, nodes) {
        const today = new Date().toLocaleDateString('zh-TW');
        const groups = {};
        questions.forEach(q => {
            const n = q.node||'其他';
            if(!groups[n]) groups[n]=[];
            groups[n].push(q);
        });

        let globalIdx = 0;
        let nodeBlocks = '';
        Object.entries(groups).forEach(([node, qs]) => {
            let problems = '';
            qs.forEach(q => {
                globalIdx++;
                problems += `
                <div class="ws-problem-item">
                    <div class="ws-step">&#9312; 步驟提示：${escapeHtml(q.step||'')}</div>
                    <div class="ws-qtext">${globalIdx}. ${escapeHtml(q.text||'')}</div>
                    <table class="ws-answer-row">
                        <tr>
                            <td width="52%">列式：<span class="ws-blank" style="min-width:160pt;">&nbsp;</span></td>
                            <td>答案：<span class="ws-blank" style="min-width:90pt;">&nbsp;</span>
                                <span style="color:#1b5e20;font-size:8.5pt;margin-left:6pt;">（正解：${escapeHtml(q.answer||'')}）</span>
                            </td>
                        </tr>
                    </table>
                    <div class="ws-hint">&#128161; ${escapeHtml(q.hint||'')}</div>
                </div>`;
            });
            nodeBlocks += `
            <div class="ws-node-block">
                <div class="ws-node-title">&#128204; 知識節點：${escapeHtml(node)}</div>
                <div class="ws-node-body">${problems}</div>
            </div>`;
        });

        return `
        <div class="ws-header">
            <h1>車城國小 ${escapeHtml(grade)} 差異化補救教學練習卷</h1>
            <div class="ws-meta">弱點節點：${nodes.map(escapeHtml).join('、')}　　出卷日期：${today}</div>
            <table><tr>
                <td>班級：<span class="ws-blank" style="min-width:70pt;">&nbsp;</span></td>
                <td>座號：<span class="ws-blank" style="min-width:50pt;">&nbsp;</span></td>
                <td>姓名：<span class="ws-blank" style="min-width:90pt;">&nbsp;</span></td>
                <td>得分：<span class="ws-blank" style="min-width:50pt;">&nbsp;</span></td>
            </tr></table>
        </div>
        ${nodeBlocks}
        <div class="ws-footer">✦ 本練習卷由 AI 根據全班共同弱點自動生成，僅供課堂輔助教學使用 ✦</div>`;
    }

    function printWorksheet() {
        if(!window._worksheetPrintHtml) return Swal.fire('提示','請先生成教學講義','info');

        // ── 關鍵修正：先把 HTML 內容存成變數，再用字串串接傳入新視窗 ──
        // 不使用 template literal 插值，避免 GAS iframe 沙盒的變數傳遞問題
        const bodyContent = window._worksheetPrintHtml;

        const css = [
            '@page { size: A4 portrait; margin: 15mm 18mm 15mm 18mm; }',
            '* { box-sizing:border-box; -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }',
            'body { font-family:"Microsoft JhengHei","微軟正黑體","PingFang TC","Noto Sans TC",sans-serif;',
            '       font-size:11pt; color:#000; background:#fff; margin:0; padding:0; }',
            '.ws-node-block { page-break-inside:avoid; margin-bottom:16pt; }',
            '.ws-problem-item { page-break-inside:avoid; margin-bottom:10pt; }',
            '.ws-header { text-align:center; margin-bottom:12pt; padding-bottom:8pt; border-bottom:2pt solid #1565c0; }',
            '.ws-header h1 { font-size:15pt; font-weight:bold; color:#1565c0; margin:0 0 4pt; }',
            '.ws-header .ws-meta { font-size:9pt; color:#444; margin-bottom:6pt; }',
            '.ws-header table { width:100%; margin:0 auto; font-size:10.5pt; border-collapse:collapse; }',
            '.ws-header td { padding:2pt 8pt; }',
            '.ws-blank { display:inline-block; border-bottom:1.5pt solid #000; min-height:14pt; }',
            '.ws-node-title { background:#1565c0 !important; color:#fff !important;',
            '  padding:5pt 10pt; border-radius:4pt 4pt 0 0; font-size:11.5pt; font-weight:bold; }',
            '.ws-node-body { border:1.5pt solid #1565c0; border-top:none;',
            '  border-radius:0 0 4pt 4pt; padding:10pt 12pt 2pt; }',
            '.ws-step { background:#fff8e1 !important; border-left:3pt solid #f9a825 !important;',
            '  padding:4pt 8pt; font-size:9pt; color:#555; margin-bottom:6pt; }',
            '.ws-qtext { font-size:11.5pt; font-weight:bold; margin-bottom:7pt; }',
            '.ws-answer-row { width:100%; border-collapse:collapse; font-size:10pt; color:#333; margin-bottom:5pt; }',
            '.ws-answer-row td { padding:2pt 0; vertical-align:bottom; }',
            '.ws-hint { background:#e3f2fd !important; border-left:3pt solid #1976d2 !important;',
            '  padding:4pt 8pt; font-size:9pt; color:#0d47a1; margin-bottom:10pt; }',
            '.ws-footer { text-align:center; font-size:8pt; color:#999; margin-top:10pt;',
            '  border-top:0.5pt solid #ddd; padding-top:5pt; }'
        ].join('\n');

        const fullHtml = '<!DOCTYPE html><html lang="zh-TW"><head>' +
            '<meta charset="UTF-8">' +
            '<title>車城國小補救教學練習卷</title>' +
            '<style>' + css + '</style>' +
            '</head><body>' +
            bodyContent +
            '</body></html>';

        const win = window.open('', '_blank', 'width=860,height=700');
        if(!win) { Swal.fire('提示','請允許瀏覽器開啟彈出視窗後再試','warning'); return; }
        win.document.open();
        win.document.write(fullHtml);
        win.document.close();

        // 使用 setTimeout 確保 DOM 完全繪製後才列印，避免空白頁
        setTimeout(function() {
            win.focus();
            win.print();
        }, 800);
    }

    async function doClearCache() {
        Swal.fire({title:'清除中...',didOpen:()=>Swal.showLoading()});
        const msg = await API.clearBankCache();
        Swal.fire('完成', msg + '\n\n⚠️ 若之前題庫的正解仍顯示日期格式（如 satjan...），請至 Bank 試算表將 F 欄（正解欄）的儲存格格式改為「純文字」，再重新讓 AI 生成一次。', 'success');
    }

    function initCanvas() { sigPad=new SignaturePad(document.getElementById('signature-pad')); }
    function resizeCanvas() {
        const cvs=document.getElementById('signature-pad');
        const r=Math.max(window.devicePixelRatio||1,1);
        cvs.width=cvs.offsetWidth*r; cvs.height=cvs.offsetHeight*r;
        cvs.getContext('2d').scale(r,r); sigPad.clear();
    }
    function toggleCanvas() {
        const p=document.getElementById('draw-panel');
        p.style.display=(p.style.display==='none'||!p.style.display)?'block':'none';
        if(p.style.display==='block') resizeCanvas();
    }
    </script>
</body>
</html>
